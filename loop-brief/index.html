      const [liveMode, setLiveMode] = useState(false);
      const [sprint, setSprint] = useState("Sprint 12");
      const [observation, setObservation] = useState('');
      const [status, setStatus] = useState('idle');      // start empty; brief appears on Generate
      const [errorMsg, setErrorMsg] = useState('');
      const [brief, setBrief] = useState(null);
      const [sources, setSources] = useState([]);
      const [generatedAt, setGeneratedAt] = useState(null);
      const [isSample, setIsSample] = useState(false);
      const [expandedSource, setExpandedSource] = useState(null);
      const [editingKey, setEditingKey] = useState(null);
      const [approved, setApproved] = useState(false);
      const [edited, setEdited] = useState(false);
      const [pendingAction, setPendingAction] = useState(null);
      const [loadingStage, setLoadingStage] = useState(0);
      const [versions, setVersions] = useState([]);   // session-scoped history
      const [activeVersion, setActiveVersion] = useState(null); // id being viewed
      const [versionSeq, setVersionSeq] = useState(0);
      const [expandedVer, setExpandedVer] = useState(null);

      // Replays the embedded real brief with a short simulated "working" beat,
      // so the sample run feels like the live pipeline (it genuinely produced
      // this brief — we're just replaying it without the cost or a live call).
      const STAGES = [
        'Running five standing queries…',
        'Retrieving across Jira, Confluence, Intercom, Marketing, Slack…',
        'De-duplicating and ranking what was found…',
        'Synthesizing the brief…'
      ];
      function runSample() {
        setErrorMsg(''); setPendingAction(null); setStatus('loading'); setLoadingStage(0);
        let i = 0;
        const tick = setInterval(() => {
          i += 1;
          if (i < STAGES.length) { setLoadingStage(i); }
          else {
            clearInterval(tick);
            setBrief(SAMPLE_DATA.brief);
            setSources(SAMPLE_DATA.sources || []);
            setGeneratedAt(SAMPLE_DATA.generated_at);
            setApproved(false); setEdited(false); setIsSample(true); setStatus('ready');
            pushVersion({ trigger: 'draft', briefSnapshot: SAMPLE_DATA.brief, sources: SAMPLE_DATA.sources || [], generatedAt: SAMPLE_DATA.generated_at });
          }
        }, 420);
      }

      // Dispatcher for the Generate button: sample replay when live is off,
      // real pipeline when live is on.
      function generate() {
        if (liveMode) callWebhook(false);
        else runSample();
      }

      async function callWebhook(withObservation) {
        if (!liveMode) { runSample(); return; }
        if (!LIVE_ENDPOINT) { setErrorMsg('No live endpoint is configured.'); return; }
        setStatus('loading'); setErrorMsg(''); setPendingAction(null);
        try {
          const body = { sprint, requested_at: new Date().toISOString() };
          if (withObservation && observation.trim()) body.observation = observation.trim();
          const res = await fetch(LIVE_ENDPOINT, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
          });
          if (!res.ok) throw new Error('Webhook returned ' + res.status);
          const data = await res.json();
          setBrief(data.brief); setSources(data.sources || []);
          const ga = data.generated_at || new Date().toISOString();
          setGeneratedAt(ga);
          setApproved(false); setEdited(false); setIsSample(false); setStatus('ready');
          pushVersion({
            trigger: withObservation ? 'observation' : 'refresh',
            observation: withObservation ? observation.trim() : '',
            briefSnapshot: data.brief, sources: data.sources || [], generatedAt: ga
          });
        } catch (err) {
          setErrorMsg((err.message || 'Failed to reach webhook.') + ' — live runs need the backend awake and CORS allowed. The sample brief below is still fully interactive.');
          setStatus('ready');
        }
      }

      const LIVE_REQUIRED = 'This runs the live pipeline — switch on "Try it live" above to steer or refresh the brief. The sample you are viewing is a real, frozen run.';
      function requestRefresh() {
        if (!liveMode) { setErrorMsg(LIVE_REQUIRED); return; }
        if (edited) setPendingAction('refresh'); else callWebhook(false);
      }
      function requestRegenerate() {
        if (!liveMode) { setErrorMsg(LIVE_REQUIRED); return; }
        if (!observation.trim()) { setErrorMsg('Add a note in the observation box first, or use Refresh to pull fresh data.'); return; }
        if (edited) setPendingAction('regenerate'); else callWebhook(true);
      }
      function confirmPending() {
        if (pendingAction === 'refresh') callWebhook(false);
        else if (pendingAction === 'regenerate') callWebhook(true);
      }

      function updateField(section, index, field, value) {
        setEdited(true);
        setBrief(prev => {
          const next = { ...prev };
          if (section === 'lead_item') next.lead_item = { ...next.lead_item, [field]: value };
          else { const list = [...next[section]]; list[index] = { ...list[index], [field]: value }; next[section] = list; }
          return next;
        });
      }

      // Append a version to the session history. The shape here is exactly
      // what a later n8n 'Google Sheets append' node would write as one row:
      // { id, n, created_at, sprint, trigger, observation, approved, brief }.
      function pushVersion({ trigger, observation, briefSnapshot, sources: srcSnap, generatedAt: ga, approved: appr }) {
        setVersionSeq(seq => {
          const n = seq + 1;
          const entry = {
            id: 'v' + n, n,
            created_at: new Date().toISOString(),
            sprint,
            trigger,                         // 'draft' | 'observation' | 'refresh' | 'manual-edit'
            observation: observation || '',
            approved: !!appr,
            brief: briefSnapshot,
            sources: srcSnap,
            generatedAt: ga,
          };
          setVersions(v => [...v, entry]);
          setActiveVersion(entry.id);
          return n;
        });
      }

      // Load a past version back into the editor view (read-the-history).
      function viewVersion(entry) {
        setBrief(entry.brief);
        setSources(entry.sources || []);
        setGeneratedAt(entry.generatedAt);
        setApproved(entry.approved);
        setEdited(false);
        setActiveVersion(entry.id);
      }

      function Editable({ section, index, field, value, multiline }) {
        const key = section + '-' + index + '-' + field;
        if (editingKey === key) {
          const Tag = multiline ? 'textarea' : 'input';
          return <Tag autoFocus className={multiline ? '' : 'inline-edit'} value={value}
            onChange={e => updateField(section, index, field, e.target.value)}
            onBlur={() => setEditingKey(null)} style={multiline ? { minHeight: 70 } : {}} />;
        }
        return <div className={'editable ' + (field === 'title' ? 'card-title' : 'card-body')}
          onClick={() => setEditingKey(key)} title="Click to edit">{value || '—'}</div>;
      }

      const SOURCE_LABELS = { jira: 'Jira', confluence_retro: 'Confluence', confluence_decision: 'Confluence', intercom: 'Intercom', marketing: 'Marketing', slack: 'Slack' };
      function shortRef(src) {
        if (!src.ref_id) return null;
        if (/^[A-Z]{2,5}-\d+$/.test(src.ref_id)) return src.ref_id;
        if (src.chunk_type === 'retro_theme') return (src.team || '') + ' retro';
        if (src.chunk_type === 'retro_action') return (src.team || '') + ' action';
        if (src.chunk_type === 'decision') return 'decision';
        if (src.chunk_type === 'cs_theme') return 'CS theme';
        if (src.chunk_type === 'campaign') return 'campaign';
        if (src.chunk_type === 'slack_message') return '#cross-team';
        return null;
      }
      function Pills({ citations }) {
        if (!citations || !citations.length) return null;
        return <div className="pills">{citations.map(num => {
          const src = sources.find(s => s.index === num);
          if (!src) return null;
          const open = expandedSource === String(num);
          const label = SOURCE_LABELS[src.source] || src.source;
          const ref = shortRef(src);
          return <button key={num} className={'pill pill-' + src.source + (open ? ' open' : '')}
            onClick={() => setExpandedSource(open ? null : String(num))}>{label}{ref ? ' · ' + ref : ''}</button>;
        })}</div>;
      }
      function SourcePanel({ citations }) {
        const openNum = (citations || []).find(c => String(c) === expandedSource);
        if (!openNum) return null;
        const src = sources.find(s => String(s.index) === expandedSource);
        if (!src) return null;
        return <div className="source-panel">
          <div className="source-meta">
            <span className="strong">{src.source}</span><span>·</span><span>{src.chunk_type}</span>
            {src.team && <><span>·</span><span>{src.team}</span></>}
            {src.ref_id && <><span>·</span><span>{src.ref_id}</span></>}
          </div>
          <div className="source-content">{src.content}</div>
        </div>;
      }
      function Card({ section, index, item }) {
        return <div className="card">
          <Editable section={section} index={index} field="title" value={item.title} />
          <Editable section={section} index={index} field="body" value={item.body} multiline />
          <Pills citations={item.citations} />
          <SourcePanel citations={item.citations || []} />
        </div>;
      }

      const activeSprintLabel = (SPRINTS.find(s => s.value === sprint) || {}).label || sprint;

      // Renders the approved, edited brief as a saved Confluence-style page —
      // a preview of the artifact the team would receive. In production this
      // page would be published automatically on approval.
      function refLabel(num) {
        const src = sources.find(s => s.index === num);
        if (!src) return null;
        const label = SOURCE_LABELS[src.source] || src.source;
        const ref = shortRef(src);
        return label + (ref ? ' · ' + ref : '');
      }
      function srcLine(cites) {
        const labels = (cites || []).map(refLabel).filter(Boolean);
        return labels.length ? 'Sources: ' + labels.join('  ·  ') : null;
      }
      function PublishedDoc() {
        const when = generatedAt ? new Date(generatedAt) : new Date();
        const dateStr = when.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        return <div className="pub">
          <div className="pub-bar">
            <span>Preview · this is the page the team would receive. In production it publishes to Confluence automatically on approval.</span>
            <span className="x" onClick={() => setApproved(false)} title="Close preview">✕</span>
          </div>
          <div className="pub-doc">
            <div className="pub-bc">ENG · Cross-team · The Loop</div>
            <h2>The Loop — {activeSprintLabel} brief</h2>
            <div className="pub-meta">Published {dateStr} · approved by facilitator</div>

            <div className="pub-sec">Lead item</div>
            {brief.lead_item && <div className="pub-item">
              <div className="pt">{brief.lead_item.title}</div>
              <div className="pb">{brief.lead_item.body}</div>
              {srcLine(brief.lead_item.citations) && <div className="ps">{srcLine(brief.lead_item.citations)}</div>}
            </div>}

            {(brief.watch_list || []).length > 0 && <div className="pub-sec">Watch list</div>}
            {(brief.watch_list || []).map((it, i) => <div className="pub-item" key={i}>
              <div className="pt">{it.title}</div>
              <div className="pb">{it.body}</div>
              {srcLine(it.citations) && <div className="ps">{srcLine(it.citations)}</div>}
            </div>)}

            {(brief.fyi || []).length > 0 && <div className="pub-sec">FYI</div>}
            {(brief.fyi || []).map((it, i) => <div className="pub-item" key={i}>
              <div className="pt">{it.title}</div>
              <div className="pb">{it.body}</div>
              {srcLine(it.citations) && <div className="ps">{srcLine(it.citations)}</div>}
            </div>)}

            <div className="pub-foot">Drafted by the Loop assistant from this week's Jira, Confluence, Intercom, Marketing, and Slack activity. Reviewed and approved by the facilitator before publishing.</div>
          </div>
        </div>;
      }

      return <div className="wrap">
        <div className="title-row">
          <h1>The Loop — Facilitator Review</h1>
          <p className="subtitle">Cross-team alignment brief · the assistant drafts, the facilitator decides</p>
        </div>

        <div className="demo-note">
          This is a working demo. Click "Generate brief" to produce this week's cross-team brief from a real run of the pipeline. Once it appears, click any title or body to edit it, and click a source pill to see exactly where each point came from. To run the live pipeline against the n8n backend, switch on "Try it live."
        </div>

        <div className="layout">
        <aside className="rail">
          <p className="rail-title">Versions</p>
          {versions.length === 0 && <p className="rail-empty">No versions yet. Generate a brief to start the history.</p>}
          {versions.map(v => (
            <div key={v.id} className={'ver' + (activeVersion === v.id ? ' active' : '')} onClick={() => { viewVersion(v); setExpandedVer(expandedVer === v.id ? null : v.id); }}>
              <div className="vh">
                <span className="vn">{new Date(v.created_at).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
              </div>
              <div className={'vr' + (expandedVer === v.id ? ' open' : '')}>{
                v.trigger === 'draft' ? 'Initial AI draft' :
                v.trigger === 'observation' ? 'Steered: "' + v.observation + '"' :
                v.trigger === 'refresh' ? 'Refreshed from latest data' :
                v.trigger === 'manual-edit' ? 'Facilitator edits' : 'Approved'
              }</div>
              {v.approved && <span className="vtag approved">approved &amp; saved</span>}
            </div>
          ))}
          {versions.length > 0 && <p className="rail-note">Session history. In production each version appends to a Google Sheet — an auditable, human-readable log.</p>}
        </aside>
        <div className="main">
        <div className="controls">
          <div className="live-toggle" onClick={() => { setLiveMode(!liveMode); setErrorMsg(''); }}>
            <span className={'switch' + (liveMode ? ' on' : '')}><span className="knob"></span></span>
            Try it live
            <span className="tip"><span className="q">?</span>
              <span className="bubble">Off: explore the sample brief (instant, no cost). On: the buttons call the real n8n + retrieval + Claude pipeline. A live run may take a few seconds.</span>
            </span>
          </div>

          <div className="control-row">
            <div className="field grow">
              <label>Data window</label>
              <select value={sprint} onChange={e => setSprint(e.target.value)} disabled={!liveMode}>
                {SPRINTS.map(s => (
                  <option key={s.value} value={s.value} disabled={!s.available}>
                    {s.label}{s.available ? '' : ' (no data yet)'}
                  </option>
                ))}
              </select>
            </div>
            <button onClick={generate} disabled={status === 'loading'}>
              {status === 'loading' ? 'Generating…' : (liveMode ? 'Generate live brief' : 'Generate brief')}
            </button>
          </div>
        </div>

        {errorMsg && <div className="msg error">{errorMsg}</div>}

        {pendingAction && <div className="msg warn">
          <span>{pendingAction === 'refresh'
            ? 'Refreshing pulls the latest data and will replace the edits you have made. Continue?'
            : 'Regenerating with your note produces a fresh brief and will replace your edits. Continue?'}</span>
          <span className="warn-actions">
            <button onClick={confirmPending}>Continue</button>
            <button className="secondary" onClick={() => setPendingAction(null)}>Cancel</button>
          </span>
        </div>}

        {status === 'idle' && <div className="empty">Pick your data window, then generate this week's Loop brief.</div>}
        {status === 'loading' && <div className="empty">{STAGES[loadingStage]}</div>}

        {brief && status !== 'loading' && <div>
          <div className="brief-head">
            <div>
              <p className="t">The Loop — pre-meeting brief</p>
              <p className="d">{activeSprintLabel}{generatedAt ? ' · generated ' + new Date(generatedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}{isSample ? ' · sample run' : ''}</p>
            </div>
            <span className={'badge' + (approved ? ' approved' : (edited ? ' edited' : ''))}>
              {approved ? 'Approved' : (edited ? 'Edited — pending review' : 'Draft — pending review')}
            </span>
          </div>

          <div className="section-head"><span className="dot lead"></span><span className="section-label">Lead item</span></div>
          {brief.lead_item && <Card section="lead_item" index={0} item={brief.lead_item} />}

          {(brief.watch_list || []).length > 0 && <div className="section-head"><span className="dot watch"></span><span className="section-label">Watch list</span></div>}
          {(brief.watch_list || []).map((item, i) => <Card key={i} section="watch_list" index={i} item={item} />)}

          {(brief.fyi || []).length > 0 && <div className="section-head"><span className="dot fyi"></span><span className="section-label">FYI</span></div>}
          {(brief.fyi || []).map((item, i) => <Card key={i} section="fyi" index={i} item={item} />)}

          <div className="obs-row">
            <div className="field grow">
              <label>Observation for the agent
                <span className="tip"><span className="q">?</span>
                  <span className="bubble">Optional. Add a steer — e.g. "the webhook issue is being handled offline, downgrade it" — then Regenerate. The agent weighs your note when prioritizing, but won't invent anything not in the data. (Live mode only.)</span>
                </span>
              </label>
              <textarea placeholder={liveMode ? "Optional note to steer the next regeneration…" : "Steering runs the live pipeline — switch on \"Try it live\" to use this"} value={observation}
                onChange={e => setObservation(e.target.value)} style={{ minHeight: 38 }} disabled={!liveMode} />
            </div>
          </div>

          <div className="actions">
            <button onClick={() => { setApproved(true); pushVersion({ trigger: edited ? 'manual-edit' : 'approved', briefSnapshot: brief, sources: sources, generatedAt: generatedAt, approved: true }); }}>✓ Approve &amp; save</button>
            <button className="secondary" onClick={requestRegenerate} disabled={status === 'loading'}>↻ Regenerate with note</button>
            <button className="secondary" onClick={requestRefresh} disabled={status === 'loading'}>⟳ Refresh data
              <span className="tip" style={{ marginLeft: 5 }}><span className="q">?</span>
                <span className="bubble">Only use this if new data has been added since this brief was generated. It pulls the latest and replaces any edits you've made. (Live mode only.)</span>
              </span>
            </button>
          </div>
          <p className="hint">Click any title or body to edit. Click a citation pill to view its source chunk.</p>

          {approved && <PublishedDoc />}
        </div>}
        </div>
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
